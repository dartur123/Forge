services:
  postgres:
    image: postgres:17
    container_name: forge-postgres
    environment:
      POSTGRES_USER: forge_user
      POSTGRES_PASSWORD: forge_dev_password
      POSTGRES_DB: forge_db
    ports:
      - "5432:5432"
    volumes:
      - forge_pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forge-api
    environment:
      ConnectionStrings__ForgeDb: "Host=postgres;Port=5432;Database=forge_db;Username=forge_user;Password=forge_dev_password"
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  forge_pg_data: